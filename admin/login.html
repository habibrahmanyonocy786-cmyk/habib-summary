<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود — Habib-summary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Vazirmatn', 'Tahoma', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="w-14 h-14 bg-gray-800 rounded-xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3">H</div>
      <h1 class="text-xl font-bold text-gray-800">ورود به پنل مدیریت</h1>
      <p class="text-gray-500 text-sm mt-1">Habib-summary</p>
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">نام کاربری</label>
        <input type="text" id="username" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gray-800 focus:ring-2 focus:ring-gray-200 outline-none transition-all text-sm" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">رمز عبور</label>
        <input type="password" id="password" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gray-800 focus:ring-2 focus:ring-gray-200 outline-none transition-all text-sm" required>
      </div>
      <button type="submit" class="w-full py-3 rounded-xl bg-gray-800 text-white font-bold hover:bg-gray-700 transition-colors text-sm">ورود</button>
    </form>
    <p id="loginError" class="text-red-500 text-sm text-center mt-4 hidden">نام کاربری یا رمز عبور اشتباه است</p>
    <p class="text-center text-xs text-gray-400 mt-6"><a href="/" class="hover:text-gray-600">بازگشت به صفحه اصلی</a></p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      // Simple auth — replace with real auth in production
      if (u === 'admin' && p === 'habib2026') {
        window.location.href = '/admin/manage.html';
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
      return false;
    }
  </script>
</body>
</html>
