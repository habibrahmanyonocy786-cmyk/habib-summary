<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدیریت — Habib-summary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Vazirmatn', 'Tahoma', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-lg font-bold text-gray-800">پنل مدیریت</h1>
      <a href="/" class="text-sm text-gray-500 hover:text-gray-800">← بازگشت به سایت</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-4">مدیریت محتوا</h2>
      <p class="text-gray-500 text-sm mb-6">این بخش برای نسخه کامل backend در دسترس خواهد بود.</p>

      <div class="grid md:grid-cols-3 gap-4">
        <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 text-center">
          <div class="text-3xl mb-2">📚</div>
          <h3 class="font-bold text-gray-700">کتاب‌ها</h3>
          <p class="text-xs text-gray-400 mt-1">مدیریت کتاب‌ها و خلاصه‌ها</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 text-center">
          <div class="text-3xl mb-2">📊</div>
          <h3 class="font-bold text-gray-700">آمار</h3>
          <p class="text-xs text-gray-400 mt-1">مشاهده آمار استفاده</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 text-center">
          <div class="text-3xl mb-2">⚙️</div>
          <h3 class="font-bold text-gray-700">تنظیمات</h3>
          <p class="text-xs text-gray-400 mt-1">تنظیمات سیستم</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
