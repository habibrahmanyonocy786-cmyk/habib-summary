<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Habib-summary - مرجع خلاصه کتاب و آزمون آنلاین با قابلیت آپلود و خلاصه‌سازی هوشمند">
  <title>Habib-summary | خلاصه کتاب و آزمون</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <header class="bg-gray-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center text-sm font-bold">H</span>
        <span class="font-bold text-base">Habib-summary</span>
      </div>
      <div class="flex items-center gap-3 text-xs text-gray-400">
        <span>Habib Rahman Yonocy</span>
        <span class="hidden sm:inline">|</span>
        <span dir="ltr" class="hidden sm:inline">0784258414</span>
        <a href="admin/login.html" class="text-gray-400 hover:text-white transition-colors">مدیریت</a>
      </div>
    </div>
  </header>

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-4 flex gap-1 overflow-x-auto">
      <button class="tab-btn active" data-tab="summaries">📚 خلاصه کتاب‌ها</button>
      <button class="tab-btn" data-tab="questions">❓ سوالات</button>
      <button class="tab-btn" data-tab="mixed">🧪 آزمون ترکیبی</button>
      <button class="tab-btn" data-tab="articles">📰 مقالات اقتصادی</button>
      <button class="tab-btn" data-tab="upload">📤 آپلود</button>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <section id="view-summaries" class="view active">
      <h2 class="text-xl font-bold text-gray-800 mb-4">خلاصه کتاب‌ها</h2>
      <div id="books" class="grid md:grid-cols-3 gap-4"></div>
      <div id="summary"></div>
    </section>

    <section id="view-questions" class="view">
      <h2 class="text-xl font-bold text-gray-800 mb-4">سوالات هر کتاب</h2>
      <div id="qBookSelect" class="flex flex-wrap gap-2 mb-4"></div>
      <div id="qArea"></div>
    </section>

    <section id="view-mixed" class="view">
      <h2 class="text-xl font-bold text-gray-800 mb-4">آزمون ترکیبی</h2>
      <div id="mixed"></div>
    </section>

    <section id="view-articles" class="view">
      <h2 class="text-xl font-bold text-gray-800 mb-4">📰 مقالات اقتصادی</h2>
      <p class="text-gray-500 text-sm mb-4">۲۰ مقاله برگزیده از Google News — منبع: Google News RSS Business</p>
      <div id="articles"></div>
    </section>

    <section id="view-upload" class="view">
      <h2 class="text-xl font-bold text-gray-800 mb-4">آپلود و خلاصه‌سازی</h2>
      <div id="upload"></div>
    </section>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-8 py-4 text-center text-gray-400 text-xs">
    Habib-summary &copy; 2026 | ساخته شده توسط Habib Rahman Yonocy | تماس: 0784258414
  </footer>

  <script src="assets/js/summarizer.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
